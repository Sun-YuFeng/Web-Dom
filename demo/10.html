<!-- 需求：
创建一个宽度 90%（最大宽度 1200px）的父容器，水平居中，使用 Grid 布局
容器内划分成如下结构：
头部（header）：占 1 行，整行宽度，高度 80px，背景色 #409eff
侧边栏（sidebar）：占 2 行，宽度 200px，背景色 #f5f5f5
主内容区（main）：占 2 行，剩余宽度，背景色 #fff
底部（footer）：占 1 行，整行宽度，高度 60px，背景色 #333
所有区域之间的间距为 20px
每个区域内添加对应文字（Header/Sidebar/Main/Footer），文字居中、白色（深色背景区）/ 黑色（浅色背景区） -->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 90%;
            height: 100vh;
            justify-content: center;
            display: grid;
            grid-template-rows: 80px repeat(2, 1fr) 60px;
            grid-template-columns: 200px repeat(4, 1fr);
            gap: 20px;
        }

        .header {
            grid-column: span 5;
            background-color: #409EFF;
            text-align: center;
        }

        .sidebar {
            grid-row: span 2;
            background-color: #f5f5f5;
            text-align: center;
        }

        .main {
            grid-row: span 2;
            grid-column: span 4;
            background-color: #fff;
            border: 1px solid gainsboro;
            text-align: center;
        }

        .footer {
            grid-column: span 5;
            background-color: #333;
            color: white;
            text-align: center;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">Header</div>
        <div class="sidebar">Sidebar</div>
        <div class="main">Main</div>
        <div class="footer">Footer</div>
    </div>
</body>

</html>
