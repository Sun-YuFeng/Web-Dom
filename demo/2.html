<!-- 创建一个 <div>（类名 box）；
设置：宽度 300px、高度 200px、背景色 #f5f5f5；
边框：1px 实线 #ddd、圆角 8px；
内边距（padding）：20px；外边距（margin）：上下 30px、左右居中；
在 box 内部加一个 <span>，设置：背景色 #4299e1、颜色 white、内边距 5px 10px、圆角 4px。 -->
<!-- =============================================== -->

<!-- CSS 属性写法错误：border/margin/padding 的值用逗号分隔（CSS 必须用空格分隔）；
.box 的背景色写错（写成 color 文字色，而非 background-color）；
margin: 30, auto 写法错误，且上下 margin 应为 30px、左右居中；
缺少 box-sizing: border-box（可选优化，避免 padding 撑大盒子尺寸）。 -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box{
            width: 300px;
            height: 200px;
            background-color: #f5f5f5;
            border:1px solid;
            border-radius: 8px;
            padding: 20px;
            margin: 30px auto; /* 修正：上下30px，左右居中（简写） */
            box-sizing: border-box; /* 优化：padding不撑大盒子总宽度 */
        }
        span{
            background-color: #4299e1;
            color: white;
            padding: 5px 10px;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class ='box'>
        <span>盒子模型基础</span>
    </div>
</body>
</html>
