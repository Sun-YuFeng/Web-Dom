<!-- 导航栏高度 60px，背景色 #2c3e50，固定在页面顶部（滚动时不消失）；
导航栏左侧显示 “LOGO”（白色文字，字体 20px，左内边距 20px）；
导航栏右侧有 3 个菜单：首页、产品、关于我们（白色文字，间距 20px，右内边距 20px）；
响应式：当屏幕宽度≤768px 时，右侧菜单隐藏，显示一个 “☰” 图标（白色，24px）；
菜单文字 hover 时，颜色变为 #3498db，过渡效果 0.3s。 -->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            margin: 0;
            padding: 0;
        }

        .navbar {
            width: 100vw;
            height: 60px;
            background-color: #2c3e50;
            display: flex;
            position: sticky;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            padding-left: 20px;
            color: white;
            font-size: 20px;
            font-weight: bold;
        }

        .menu {
            display: flex;
            padding-right: 20px;
            gap: 20px;
        }

        a {
            color: white;
            text-decoration: none;
            transition: all 0.3s ease
        }

        a:hover {
            color: #3498db;
        }

        .iron {
            display: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
        }

        @media (max-width:768px) {
            .menu {
                display: none;
            }

            .iron {
                display: block;
            }
        }
    </style>
</head>

<body>
    <div class="navbar">
        <div class="logo">LOGO</div>
        <div class="menu">
            <a href='#' id='index'>首页</a>
            <a href='#' id='product'>产品</a>
            <a href='#' id='about'>关于我们</a>
        </div>
        <div class="iron">☰</div>
    </div>
</body>

</html>
