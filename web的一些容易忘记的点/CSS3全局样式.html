<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            /* 主色调 */
            --secondary-color: #3498db;
            /* 辅助色 */
            --accent-color: #e74c3c;
            /* 强调色 */
            --light-color: #ecf0f1;
            /* 浅色背景 */
            --text-color: #333;
            /* 文本颜色 */
            --shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            /* 阴影样式 */
        }
    </style>
</head>

<body>
<!-- 在css里面写好一些默认样式后，后续调用直接使用变量 示例： var(--primary-color) -->
 <!-- js调用也可以这样：getComputedStyle(document.documentElement).getPropertyValue('--primary-color')  -->
</body>

</html>
